services:
  postgres:
    image: postgres:16-alpine
    container_name: creditmap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-creditmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-creditmap_secret}
      POSTGRES_DB: ${POSTGRES_DB:-creditmap_dev}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-creditmap}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creditmap_network

  redis:
    image: redis:7-alpine
    container_name: creditmap_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creditmap_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: creditmap_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis_secret}
    ports:
      - '8081:8081'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - creditmap_network
    profiles:
      - tools

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: creditmap_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@creditmap.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - creditmap_network
    profiles:
      - tools

volumes:
  postgres_data:
    name: creditmap_postgres_data
  redis_data:
    name: creditmap_redis_data

networks:
  creditmap_network:
    name: creditmap_network
    driver: bridge
